name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Which part of the version to increment"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Build & publish (darwin-arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust (native addon)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native addon
        run: bun run build:native

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Resolve next version
        id: version
        run: |
          LATEST="$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo v0.0.0)"
          NEXT="$(LATEST="$LATEST" BUMP="${{ github.event.inputs.bump }}" bun -e '
            const [maj, min, pat] = (process.env.LATEST || "v0.0.0")
              .replace(/^v/, "")
              .split(".")
              .map(Number);
            const bump = process.env.BUMP;
            const next =
              bump === "major"
                ? [maj + 1, 0, 0]
                : bump === "minor"
                  ? [maj, min + 1, 0]
                  : [maj, min, pat + 1];
            console.log(next.join("."));
          ')"
          echo "value=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Releasing v$NEXT (previous: $LATEST)"

      - name: Regenerate and commit schema
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bun run build:schema
          if ! git diff --quiet -- flatmaxxing.schema.json; then
            git add flatmaxxing.schema.json
            git commit -m "chore: regenerate flatmaxxing.schema.json for v${{ steps.version.outputs.value }}"
            git push origin "HEAD:${{ github.ref_name }}"
          else
            echo "schema already up to date"
          fi

      - name: Create and push tag
        run: |
          git tag "v${{ steps.version.outputs.value }}"
          git push origin "v${{ steps.version.outputs.value }}"

      - name: Build release binary
        env:
          FLATMAXX_VERSION: ${{ steps.version.outputs.value }}
        run: bun run build

      - name: Package binary + checksum
        id: package
        run: |
          cp dist/flatmaxx flatmaxx-darwin-arm64
          shasum -a 256 flatmaxx-darwin-arm64 > flatmaxx-darwin-arm64.sha256
          echo "sha256=$(shasum -a 256 flatmaxx-darwin-arm64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            flatmaxx-darwin-arm64
            flatmaxx-darwin-arm64.sha256

      # Bumps Formula/flatmaxx.rb on main so `brew upgrade` picks up the release.
      # Requires main to be pushable with GITHUB_TOKEN; if main is branch-protected
      # this step is skipped (continue-on-error) and the formula must be bumped manually.
      - name: Bump Homebrew formula
        continue-on-error: true
        env:
          V: ${{ steps.version.outputs.value }}
          SHA: ${{ steps.package.outputs.sha256 }}
        run: |
          git fetch origin main
          git checkout -B main origin/main
          bun -e '
            const path = "Formula/flatmaxx.rb";
            let text = await Bun.file(path).text();
            text = text.replace(/version "[^"]*"/, `version "${process.env.V}"`);
            text = text.replace(/sha256 "[^"]*"/, `sha256 "${process.env.SHA}"`);
            await Bun.write(path, text);
          '
          git add Formula/flatmaxx.rb
          git commit -m "chore: bump homebrew formula to v$V" || { echo "formula already up to date"; exit 0; }
          git push origin main
